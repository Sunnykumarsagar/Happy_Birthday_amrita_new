<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Amrita ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
    overflow: hidden;
}
.container {
    padding: 20px;
    margin-top: 15vh;
}
#text {
    font-size: 18px;
    margin-top: 20px;
    min-height: 100px;
}
button {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    margin: 10px;
    cursor: pointer;
}
#next { background: white; color: #ff4d6d; }
#yes { background: #28a745; color: white; }
#no {
    background: #dc3545;
    color: white;
    position: absolute;
}
.heart {
    position: absolute;
    animation: float 6s linear infinite;
}
@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title">🎂 Happy Birthday Amrita ❤️</h1>
    <div id="text"></div>
    <button id="next">Start 💌</button>

    <div id="question" style="display:none;">
        <h2>Will you make me the happiest person? ❤️</h2>
        <button id="yes">Yes 😊</button>
        <button id="no">No 😜</button>
    </div>
</div>

<script>
const messages = [
`🎉 Happy Birthday Amrita ❤️
May your day be filled with happiness, smiles and everything you love ✨`,

`Amrita, tumhara naam hi ek ehsaas hai,
Jaise har khushi ka tumse hi aagaaz hai,
Tum paas ho toh sab kuch apna sa lagta hai,
Tum bin yeh dil bilkul udaas hai… ❤️`,

`Chand bhi sharma jaaye tumhari muskaan se,
Phool bhi mehke tumhari pehchaan se,
Itni pyaari ho tum Amrita,
Ki khuda bhi fida ho jaaye tumhari adaon se… ✨`,

`Har pal tumhe sochna aadat si ban gayi hai,
Tumhari baatein meri chahat si ban gayi hai,
Pata nahi kya jaadu hai tum mein Amrita,
Tum hi meri zindagi ki zarurat ban gayi ho… 💕`,

`Dil kehta hai bas ek baat,
Amrita ho tum mere saath… ❤️`,

`Tum haan keh do toh duniya jeet jaaun,
Tum muskura do toh sab kuch paa jaaun,
Amrita, bas itni si khwahish hai,
Tum meri ho jao… aur main tumhara ho jaaun… 💍`
];

let index = 0;
const textDiv = document.getElementById("text");
const nextBtn = document.getElementById("next");
const questionDiv = document.getElementById("question");

function typeText(text) {
    textDiv.innerHTML = "";
    let i = 0;
    function type() {
        if (i < text.length) {
            textDiv.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 30);
        }
    }
    type();
}

typeText(messages[index]);

nextBtn.onclick = () => {
    index++;
    if (index < messages.length) {
        typeText(messages[index]);
    } else {
        nextBtn.style.display = "none";
        document.getElementById("title").innerText = "One last thing ❤️";
        questionDiv.style.display = "block";
    }
};

const noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover", () => {
    noBtn.style.top = Math.random() * window.innerHeight + "px";
    noBtn.style.left = Math.random() * window.innerWidth + "px";
});

document.getElementById("yes").onclick = () => {
    document.body.innerHTML = `
        <h1 style="margin-top:30vh;">
        Amrita ❤️ <br><br>
        Once again Happy Birthday 🎂✨<br><br>
        You are truly special to me 💖<br><br>
        I promise to always keep you smiling 😊
        </h1>
    `;
};

setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 20 + 10 + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 300);
</script>

</body>
</html>
